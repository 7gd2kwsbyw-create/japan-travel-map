<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日旅 x 散策 x 拾光</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400&family=Noto+Ser" rel="stylesheet">
</head>
<body>

    <div id="scroll-spacer"></div>

    <div id="bg-photo"></div>
    <div id="dark-overlay"></div>
    
    <div id="main-title-container">
        <h1 id="main-title">深秋的香嵐溪，時間靜止在楓紅之中</h1>
    </div>

    <div class="side-click-zone left-zone" id="prev-btn">
        <span class="arrow">〈</span>
    </div>
    <div class="side-click-zone right-zone" id="next-btn">
        <span class="arrow">〉</span>
    </div>

    <div id="gallery-counter">01 / 09</div>
    <div id="location-hint">📍 愛知縣 ． 香嵐溪巴川畔</div>

    <div id="close-gallery-mode-btn">✕ EXIT HOME</div>

    <div id="open-index-btn">
        <svg viewBox="0 0 24 24" width="24" height="24">
            <rect x="3" y="3" width="4" height="4" fill="currentColor"/>
            <rect x="10" y="3" width="4" height="4" fill="currentColor"/>
            <rect x="17" y="3" width="4" height="4" fill="currentColor"/>
            <rect x="3" y="10" width="4" height="4" fill="currentColor"/>
            <rect x="10" y="10" width="4" height="4" fill="currentColor"/>
            <rect x="17" y="10" width="4" height="4" fill="currentColor"/>
            <rect x="3" y="17" width="4" height="4" fill="currentColor"/>
            <rect x="10" y="17" width="4" height="4" fill="currentColor"/>
            <rect x="17" y="17" width="4" height="4" fill="currentColor"/>
        </svg>
    </div>

    <div id="gallery-index-panel">
        <div class="index-close-btn" id="close-index-btn">✕ CLOSE</div>
        <div class="masonry-grid" id="index-grid"></div>
    </div>

    <div id="map-container">
        <div id="back-to-map-btn">✕ BACK TO FULL MAP</div>
        
        <div id="map-preview-card">
            <img src="" id="map-preview-img" alt="Preview">
            <div id="map-preview-title"></div>
        </div>

        <svg viewBox="0 0 1000 1000" id="japan-map">
            <rect width="1000" height="1000" fill="none"/>
            
            <g id="map-zoom-group">
                
                <path d="M600,100 L900,400 L500,800 L200,900" class="land" />

                <g id="pref-aichi" class="prefecture-group" data-pref="愛知縣">
                    <path d="M520,600 L580,580 L600,630 L540,650 Z" class="prefecture" />
                    <g class="map-pin pref-pin" data-x="560" data-y="610">
                        <path class="pin-shape" d="M12,2 C7.03,2 3,6.03 3,11 C3,16.55 12,22 12,22 C12,22 21,16.55 21,11 C21,6.03 16.97,2 12,2 Z" fill="#ff4757"/>
                        <circle cx="12" cy="11" r="4" fill="#fff"/>
                    </g>
                </g>

                <g id="pref-shimane" class="prefecture-group" data-pref="島根縣">
                    <path d="M300,600 L380,550 L420,600 L350,650 Z" class="prefecture" />
                    <g class="map-pin pref-pin" data-x="360" data-y="590">
                        <path class="pin-shape" d="M12,2 C7.03,2 3,6.03 3,11 C3,16.55 12,22 12,22 C12,22 21,16.55 21,11 C21,6.03 16.97,2 12,2 Z" fill="#ff4757"/>
                        <circle cx="12" cy="11" r="4" fill="#fff"/>
                    </g>
                </g>

                <g id="spots-layer">
                    <g class="map-pin spot-pin" data-album-index="0" cx="550" cy="615">
                        <path class="pin-shape" d="M12,2 C7.03,2 3,6.03 3,11 C3,16.55 12,22 12,22 C12,22 21,16.55 21,11 C21,6.03 16.97,2 12,2 Z" fill="#2ed573"/>
                        <circle cx="12" cy="11" r="3" fill="#fff"/>
                        <text x="15" y="-5" class="spot-label">香嵐溪巴川畔</text>
                    </g>

                    <g class="map-pin spot-pin" data-album-index="1" cx="390" cy="575">
                        <path class="pin-shape" d="M12,2 C7.03,2 3,6.03 3,11 C3,16.55 12,22 12,22 C12,22 21,16.55 21,11 C21,6.03 16.97,2 12,2 Z" fill="#2ed573"/>
                        <circle cx="12" cy="11" r="3" fill="#fff"/>
                        <text x="15" y="-5" class="spot-label">美保神社</text>
                    </g>
                </g>

            </g>
        </svg>
    </div>

    <script src="script.js"></script>
</body>
</html>
