<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日旅 x 散策 x 拾光</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400&family=Noto+Ser:wght@300;400&display=swap" rel="stylesheet">
</head>
<body>

    <div id="scroll-spacer"></div>

    <div id="bg-photo"></div>
    <div id="dark-overlay"></div>
    
    <div id="main-title-container">
        <h1 id="main-title">深秋的香嵐溪，時間靜止在楓紅之中</h1>
    </div>

    <div class="side-click-zone left-zone" id="prev-btn">
        <span class="arrow">〈</span>
    </div>
    <div class="side-click-zone right-zone" id="next-btn">
        <span class="arrow">〉</span>
    </div>

    <div id="gallery-counter">01 / 09</div>
    <div id="location-hint">📍 愛知縣 ． 香嵐溪巴川畔</div>

    <div id="close-gallery-mode-btn">✕ EXIT HOME</div>

    <div id="open-index-btn">
        <svg viewBox="0 0 24 24" width="24" height="24">
            <rect x="3" y="3" width="4" height="4" fill="currentColor"/>
            <rect x="10" y="3" width="4" height="4" fill="currentColor"/>
            <rect x="17" y="3" width="4" height="4" fill="currentColor"/>
            <rect x="3" y="10" width="4" height="4" fill="currentColor"/>
            <rect x="10" y="10" width="4" height="4" fill="currentColor"/>
            <rect x="17" y="10" width="4" height="4" fill="currentColor"/>
            <rect x="3" y="17" width="4" height="4" fill="currentColor"/>
            <rect x="10" y="17" width="4" height="4" fill="currentColor"/>
            <rect x="17" y="17" width="4" height="4" fill="currentColor"/>
        </svg>
    </div>

    <div id="gallery-index-panel">
        <div class="index-close-btn" id="close-index-btn">✕ CLOSE</div>
        <div class="masonry-grid" id="index-grid"></div>
    </div>

    <div id="map-container">
        <div id="back-to-map-btn">✕ BACK TO FULL MAP</div>
        
        <div id="map-preview-card">
            <img src="" id="map-preview-img" alt="Preview">
            <div id="map-preview-title"></div>
        </div>

        <svg class="geolonia-svg-map" viewBox="0 0 1000 1000" xmlns="http://www.w3.org/2000/svg" id="japan-map">
          <title>Japanese Prefectures</title>
          <desc>Created by Geolonia (https://geolonia.com/).</desc>
          
          <g id="map-zoom-group" transform="matrix(1.028807, 0, 0, 1.028807, -47.544239, -28.806583)">
            <g class="prefectures" transform="matrix(1, 0, 0, 1, 6, 18)">
              
              <g class="shimane chugoku prefecture" data-code="32" stroke-linejoin="round" fill-rule="nonzero" stroke="#000000" stroke-width="1.0" transform="translate(211.000000, 610.000000)">
                <title>島根 / Shimane</title>
                <path d="M2,100 L10,98 L25,84 L35,78 L41,70 L52,65 L55,59 L53,55 L70,51 L76,46 L79,49 L87,48 L84,50 L82,51 L88,59 L87,68 L79,70 L81,73 L77,79 L64,77 L57,85 L51,88 L54,93 L46,95 L41,93 L39,96 L31,94 L25,99 L26,101 L24,107 L19,112 L21,114 L17,116 L18,120 L15,124 L13,122 L7,124 L5,120 L7,115 L2,115 L0,111 L4,106 L2,100 Z"/>
              </g>

              <g class="aichi chubu prefecture" data-code="23" stroke-linejoin="round" fill-rule="nonzero" stroke="#000000" stroke-width="1.0" transform="translate(469.000000, 673.000000)">
                <title>愛知 / Aichi</title>
                <polygon points="42 46 18 52 20 47 23 49 31 43 33 46 35 43 34 40 28 37 26 41 18 40 14 37 16 29 12 40 16 45 13 45 9 41 10 36 8 33 8 28 12 21 5 25 0 17 1 11 5 3 15 0 21 8 26 10 33 8 39 12 46 8 47 14 52 11 60 13 50 33 42 38"/>
              </g>

              <g id="dynamic-pref-pins-layer"></g>

              <g id="spots-layer">
                  <g class="map-pin spot-pin" data-album-index="0" id="spot-korankei">
                      <path class="pin-shape" d="M12,2 C7.03,2 3,6.03 3,11 C3,16.55 12,22 12,22 C12,22 21,16.55 21,11 C21,6.03 16.97,2 12,2 Z" fill="#2ed573"/>
                      <circle cx="12" cy="11" r="3" fill="#fff"/>
                      <text x="16" y="14" class="spot-label">香嵐溪巴川畔</text>
                  </g>
                  <g class="map-pin spot-pin" data-album-index="1" id="spot-miho">
                      <path class="pin-shape" d="M12,2 C7.03,2 3,6.03 3,11 C3,16.55 12,22 12,22 C12,22 21,16.55 21,11 C21,6.03 16.97,2 12,2 Z" fill="#2ed573"/>
                      <circle cx="12" cy="11" r="3" fill="#fff"/>
                      <text x="16" y="14" class="spot-label">美保神社</text>
                  </g>
              </g>

            </g>

            <g class="boundary-line" stroke="#EEEEEE" stroke-width="12" stroke-linejoin="round">
              <line x1="320.227" y1="361.996" x2="582.351" y2="109.378"/>
              <line x1="277.337" y1="380.162" x2="46.213" y2="380.162"/>
            </g>
          </g>
        </svg>
    </div>

    <script src="script.js"></script>
</body>
</html>
