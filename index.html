<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日本自駕漫遊</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kiwi+Maru:wght@300;400&family=Noto+Sans+TC:wght@300;400&family=Noto+Serif+TC:wght@300;400&display=swap" rel="stylesheet">
</head>
<body>

    <div id="scroll-spacer"></div>

    <div id="bg-photo"></div>
    <div id="dark-overlay"></div>
    
    <div id="main-title-container">
        <h1 id="main-title" data-status="文章撰寫中，敬請期待">載入中...</h1>
    </div>

    <div class="side-click-zone left-zone" id="prev-btn">
        <span class="arrow">〈</span>
    </div>
    <div class="side-click-zone right-zone" id="next-btn">
        <span class="arrow">〉</span>
    </div>

    <div id="location-hint">📍 載入中...</div>

    <div id="article-reader-panel">
        <div class="reader-close-btn" id="close-reader-btn">✕ CLOSE</div>
        <div class="reader-content-wrapper">
            <div class="reader-meta" id="reader-date">2026.11.25</div>
            <h2 class="reader-title" id="reader-title">文章標題</h2>
            <div class="reader-body" id="reader-body">
                </div>
        </div>
    </div>

    <div id="map-container">
        <svg viewBox="0 0 1000 1000" id="japan-map">
            <path d="M700,200 L800,300 L600,500 L300,700" class="land" />
            <path d="M300,600 L380,550 L420,600 L350,650" id="shimane" class="prefecture" />
            <circle cx="360" cy="590" r="8" class="spot-dot" data-spot="出雲大社"></circle>
            <circle cx="390" cy="570" r="8" class="spot-dot" data-spot="松江城"></circle>
            <circle cx="340" cy="620" r="8" class="spot-dot" data-spot="石見銀山"></circle>
        </svg>
    </div>

    <div id="tooltip"></div>
    <div id="right-panel">
        <img src="gr-photo.jpg" class="gr-card" alt="Ricoh GR 實景">
    </div>

    <script src="articles-data.js"></script>
    <script src="script.js"></script>
</body>
</html>
